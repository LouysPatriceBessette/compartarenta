name: compartarenta_workspace
publish_to: none

environment:
  sdk: ^3.11.5

workspace:
  - mobile

dev_dependencies:
  melos: ^7.7.0

melos:
  # Vendored Flutter SDK (same as many scripts in this repo).
  sdkPath: tools/flutter

  scripts:
    # Scripts run from the workspace root (this directory). Use `cd mobile` so
    # Flutter/Dart resolve the app package even without `melos` on PATH.
    analyze:
      description: Run Flutter analyzer in the mobile package
      run: cd mobile && flutter analyze .

    get:
      description: |
        Resolve workspace dependencies (skips pub get when pubspec inputs
        are unchanged). Set COMPARTARENTA_FORCE_PUB_GET=1 to always refresh.
      run: |
        set -e
        source ./tool/ensure_pub_get.sh
        ensure_workspace_pub_get

    codegen:
      description: Run build_runner (Drift, etc.) in mobile
      run: cd mobile && dart run build_runner build

    clean:
      description: Flutter clean in mobile (web dev session JSON is outside .dart_tool)
      run: cd mobile && flutter clean

    refresh:
      description: Clean, pub get, then codegen in mobile
      run: |
        set -e
        cd mobile
        flutter clean
        flutter pub get
        dart run build_runner build

    run:dev:
      description: |
        Run the app (dev flavor) from mobile. Defaults to the real relay
        (https://sync.incoherences.org); override with the API_BASE_URL
        env var. Extra args go through (e.g. -d chrome, -d linux).
        Add --screenshot on Android to hide the Simulation ribbon while
        capturing app screenshots; the Simulation mode remains active.
      run: cd mobile && ./tool/run_dev.sh

    run:dev:web:
      description: |
        Run the dev configuration in the desktop browser (Chrome). Flutter
        web does not support --flavor, so the script forwards the dev
        --dart-define values without --flavor. Default API_BASE_URL is
        the real relay; override via env or extra args. The web server
        defaults to http://localhost:5001 (relay CORS / Apache allow-list).
        Drift/prefs/identity persist via a host JSON file updated after
        onboarding and on each DB flush (Ctrl+C safe). Session server port
        auto-picks 18765-18799 if 18765 is busy (sandbox zombies). CanvasKit
        is served locally (--no-web-resources-cdn) to avoid gstatic CDN fetch
        failures on slow networks. Override
        WEB_PORT=5002 or dart run melos run run:dev:web -- --web-port=...
        Reset web dev data: dart run melos run delete:web-dev-session
      run: cd mobile && chmod +x ./tool/run_dev_web.sh && ./tool/run_dev_web.sh

    stop:web-dev-session:
      description: |
        Stop the loopback web dev session server (default port 18765) and free the port.
        Use when run:dev:web reports "Address already in use".
      run: cd mobile && chmod +x ./tool/stop_web_dev_session.sh && ./tool/stop_web_dev_session.sh

    delete:web-dev-session:
      description: |
        Delete ~/.cache/compartarenta/web-dev-session.json and schedule a wipe of
        browser storage (OPFS Drift DB, localStorage mirrors, prefs) on the next
        run:dev:web launch. Use before a fresh onboarding / handshake on web.
      run: cd mobile && chmod +x ./tool/delete_web_dev_session.sh && ./tool/delete_web_dev_session.sh

    web:assets:
      description: |
        Refresh Drift's web runtime assets (sqlite3.wasm + drift_worker)
        under mobile/web/ using the versions pinned in pubspec.lock. Run
        after a `drift` or `sqlite3` version bump.
      run: cd mobile && ./tool/install_web_assets.sh

    build:apk:prod:
      description: |
        Release APK (prod); output under mobile/build/app/outputs/flutter-apk/.
        The build name is derived from the latest reachable git tag and the
        build number is the count of commits between that tag and HEAD (so an
        auditor reporting an issue can pinpoint the exact commit by stripping
        the tag's commits, e.g. tag v0.1.0 + build 37 -> 37 commits past v0.1.0).
      run: |
        cd mobile
        VERSION_FLAGS=$(./tool/compute_version.sh)
        echo "Stamping APK with ${VERSION_FLAGS}"
        flutter build apk --release --flavor prod ${VERSION_FLAGS}

    build:apk:dev:
      description: |
        Release APK (dev) for internal demos; defaults to the real relay.
        Build name/number are derived from git (see build:apk:prod for
        details).
      run: |
        cd mobile
        API_BASE_URL_VALUE="${API_BASE_URL:-https://sync.incoherences.org}"
        VERSION_FLAGS=$(./tool/compute_version.sh)
        echo "Stamping APK with ${VERSION_FLAGS}"
        flutter build apk --release --flavor dev --dart-define=ENV=dev --dart-define="API_BASE_URL=${API_BASE_URL_VALUE}" ${VERSION_FLAGS}

    apk:list:
      description: List APK outputs (from repo root; run a build:apk:* script first)
      run: ls -lah mobile/build/app/outputs/flutter-apk/ || true

    qa:create-avd:
      description: |
        Create the Bojairu-QA Android emulator (phase 0). Installs the
        pinned system image when missing. Idempotent.
      run: chmod +x ./tool/create_qa_avd.sh && ./tool/create_qa_avd.sh

    qa:start-emulator:
      description: |
        Start the Bojairu-QA emulator (cold boot). Pass -- --quick to
        resume from a snapshot instead of -no-snapshot-load.
      run: chmod +x ./tool/start_qa_emulator.sh && ./tool/start_qa_emulator.sh

    qa:install-maestro:
      description: Install the Maestro CLI locally (~/.maestro/bin) for manual E2E runs
      run: chmod +x ./tool/install_maestro.sh && ./tool/install_maestro.sh

    qa:build-apk:
      description: |
        Build a dev-flavor debug APK for manual QA on the emulator
        (mobile/build/app/outputs/flutter-apk/app-dev-debug.apk).
      run: chmod +x ./tool/build_qa_apk.sh && ./tool/build_qa_apk.sh

    qa:install-apk:
      description: Install the QA debug APK on the running emulator via adb
      run: chmod +x ./tool/install_qa_apk.sh && ./tool/install_qa_apk.sh

    qa:verify:
      description: |
        Verify QA toolchain (phase-0 prerequisites, scenario manifests,
        Maestro ↔ Dart semantics alignment).
      run: chmod +x ./tool/verify_qa.sh && ./tool/verify_qa.sh

    qa:validate-scenarios:
      description: Validate qa/scenarios/*.yaml manifests, seeds, and flows
      run: python3 ./tool/qa_scenario_manifest.py --validate

    qa:verify-semantics:
      description: Verify Maestro qa-* ids in flows match Dart Semantics identifiers
      run: python3 ./tool/verify_qa_semantics.py

    qa:seed:
      description: |
        Seed a QA scenario on the emulator (clears app data, cold-starts once).
        Example: dart run melos run qa:seed -- settlement_window_open
      run: chmod +x ./tool/seed_qa_scenario.sh && ./tool/seed_qa_scenario.sh "$@"

    qa:run-scenario:
      description: |
        Run a full manual QA scenario (date, seed, Maestro flow, artifacts).
        Example: dart run melos run qa:run-scenario -- settlement_window_open
      run: chmod +x ./tool/run_scenario.sh && ./tool/run_scenario.sh "$@"

    qa:run-all-scenarios:
      description: |
        Discover and run all qa/scenarios/*.yaml on the emulator; writes
        qa/artifacts/run-<timestamp>/index.html aggregated report.
        Example: dart run melos run qa:run-all-scenarios
      run: chmod +x ./tool/run_all_scenarios.sh && ./tool/run_all_scenarios.sh "$@"

    qa:run-multi-scenario:
      description: |
        Run a multi-device QA scenario (two emulators + coordinator script).
        Example: ./tool/melosw run qa:run-multi-scenario -- contact_handshake_happy_path --skip-build
      run: chmod +x ./tool/run_multi_device_scenario.sh && ./tool/run_multi_device_scenario.sh "$@"

    qa:run-fcm-wake-push:
      description: |
        FCM wake manual QA — Monica emulator sends; physical recipient (default R3CY202HKYL)
        with app closed. Sequential steps; operator confirms notification visually.
        Example: ./tool/melosw run qa:run-fcm-wake-push -- --skip-build
      run: chmod +x ./tool/run_fcm_wake_push_scenario.sh && ./tool/run_fcm_wake_push_scenario.sh "$@"

    qa:run-payment-reminder:
      description: |
        Housing payment reminders #10 (J−4, J−2, due day) + #11 overdue — single Monica emulator
        (simulated notifications + journal persistence, no relay).
        Example: ./tool/melosw run qa:run-payment-reminder -- --skip-build
      run: chmod +x ./tool/run_housing_payment_reminder_scenario.sh && ./tool/run_housing_payment_reminder_scenario.sh "$@"

    qa:run-vehicle-sale-export-import:
      description: |
        Vehicle sale export → full emulator stop/cold boot → reseed buyer → import
        (single emulator). Seller seed (32 sessions / 8 fuel / 1 oil), Maestro export,
        debug zip pin, empty Louys buyer, Maestro import, assert qa-vehicle-card-qa-civic.
        Example: ./tool/melosw run qa:run-vehicle-sale-export-import -- --skip-build
      run: chmod +x ./tool/run_vehicle_sale_export_import_scenario.sh && ./tool/run_vehicle_sale_export_import_scenario.sh "$@"

    qa:run-vehicle-sale-export-import-undo:
      description: |
        Same phases 1–6 as qa:run-vehicle-sale-export-import, then import flow taps
        Défaire l'importation (observe current undo behavior; no rename/confirm path).
        Example: ./tool/melosw run qa:run-vehicle-sale-export-import-undo -- --skip-build
      run: chmod +x ./tool/run_vehicle_sale_export_import_undo_scenario.sh && ./tool/run_vehicle_sale_export_import_undo_scenario.sh "$@"
