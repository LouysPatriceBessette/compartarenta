appId: com.compartarenta.compartarenta.dev
---
# Participants step: contact pick + persist can lag; retry Next.
- extendedWaitUntil:
    visible:
      id: "qa-housing-wizard-participants-step"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 5000
- repeat:
    times: 5
    commands:
      - runFlow:
          when:
            visible:
              id: "qa-housing-wizard-participants-step"
          commands:
            - tapOn:
                id: "qa-housing-wizard-next"
            - waitForAnimationToEnd:
                timeout: 3000
- extendedWaitUntil:
    visible:
      id: "qa-housing-wizard-dates-step"
    timeout: 45000
