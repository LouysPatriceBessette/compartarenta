appId: com.compartarenta.compartarenta.dev
---
- runFlow:
    file: _enter_vehicle_hub.yaml
- takeScreenshot: 01_vehicle_hub
- tapOn:
    id: "qa-vehicle-add-fab"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-field-label"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-field-label"
- inputText: "Mon QA"
- tapOn:
    id: "qa-vehicle-field-make"
- inputText: "Honda"
- tapOn:
    id: "qa-vehicle-field-model"
- inputText: "Civic"
- tapOn:
    id: "qa-vehicle-field-color"
- inputText: "Bleu"
- tapOn:
    id: "qa-vehicle-field-year"
- inputText: "2020"
- runFlow:
    file: _dismiss_ime_done.yaml
- tapOn:
    id: "qa-vehicle-field-meter"
- inputText: "50000"
- runFlow:
    file: _dismiss_ime_done.yaml
- scrollUntilVisible:
    element:
      id: "qa-vehicle-field-tank-capacity"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "qa-vehicle-field-tank-capacity"
- inputText: "60"
- runFlow:
    file: _dismiss_ime_done.yaml
- tapOn:
    id: "qa-vehicle-field-oil-interval"
- inputText: "5"
- runFlow:
    file: _dismiss_ime_done.yaml
- scrollUntilVisible:
    element:
      id: "qa-vehicle-consumption-mode-simple"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "qa-vehicle-consumption-mode-simple"
- scrollUntilVisible:
    element:
      id: "qa-vehicle-save"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-vehicle-save"
    enabled: true
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-hub"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-mon-qa"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-mon-qa"
    timeout: 30000
- takeScreenshot: 02_vehicle_added
