appId: com.compartarenta.compartarenta.dev
---
# App already in foreground (post-accept or post-activation). Do not call
# launchApp stopApp: false — it can hang on emulator while the hub is visible.
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible:
      id: "qa-housing-active-hub"
    timeout: 10000
- takeScreenshot: active_hub
