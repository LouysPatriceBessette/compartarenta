appId: com.compartarenta.compartarenta.dev
---
- runFlow:
    file: _enter_vehicle_hub.yaml
- takeScreenshot: 01_vehicle_hub
# --- Start session with +100 km gap → confirm positive differential ---
- tapOn:
    id: "qa-vehicle-quick-action-session-start"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-field-session-meter"
    timeout: 30000
- takeScreenshot: 02_session_start_prefilled
- tapOn:
    id: "qa-vehicle-field-session-meter"
# Prefill is formatStoredMeterForInput → "50 000.0" (8 chars); must clear fully.
- eraseText
- inputText: "50100"
- runFlow:
    file: _dismiss_ime_done.yaml
- scrollUntilVisible:
    element:
      id: "qa-vehicle-save"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-vehicle-save"
    enabled: true
- runFlow:
    file: _vehicle_gap_confirm_yes.yaml
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-hub"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-civic-meter"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic-meter"
      text: ".*50 100\\.0.*"
    timeout: 30000
- takeScreenshot: 03_session_start_gap_saved
