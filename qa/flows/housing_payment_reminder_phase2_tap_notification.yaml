appId: com.compartarenta.compartarenta.dev
---
# Tap #10 in notification shade → Accepted expenses journal + before-due tile.
- extendedWaitUntil:
    visible: ".*#10 Rappel de paiement.*"
    timeout: 30000
- takeScreenshot: phase2_notification_shade
- tapOn: ".*#10 Rappel de paiement.*"
- takeScreenshot: phase2_after_notification_tap
- extendedWaitUntil:
    visible:
      id: "qa-housing-monthly-expenses-screen"
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "qa-housing-before-due-journal-card"
    timeout: 30000
- takeScreenshot: phase2_before_due_journal_card
