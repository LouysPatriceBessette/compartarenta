appId: com.compartarenta.compartarenta.dev
---
# Invitee (Louys): redeem when inviter rejects duplicate_module_anchor — no new row.
- runFlow:
    file: _enter_contacts_hub.yaml
- tapOn:
    id: "qa-contacts-redeem-open"
- extendedWaitUntil:
    visible:
      id: "qa-contacts-redeem-code-field"
    timeout: 30000
- tapOn:
    id: "qa-contacts-redeem-code-field"
- inputText: ${INVITE_CODE}
- extendedWaitUntil:
    visible:
      id: "qa-contacts-redeem-submit"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-contacts-redeem-submit"
- runFlow:
    file: _accept_notification_prompt.yaml
# Anchor reject: dialog overlays redeem (contacts list listener) — not redeem-open.
- extendedWaitUntil:
    visible:
      id: "qa-contacts-duplicate-dialog-invitee-rejected-anchor"
    timeout: 60000
- tapOn:
    id: "qa-contacts-duplicate-dialog-ok"
