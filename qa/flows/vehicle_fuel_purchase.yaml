appId: com.compartarenta.compartarenta.dev
---
- runFlow:
    file: _enter_vehicle_hub.yaml
- takeScreenshot: 01_vehicle_hub
- tapOn:
    id: "qa-vehicle-quick-action-fuel"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-field-cost"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-field-cost"
- inputText: "80"
- tapOn:
    id: "qa-vehicle-field-volume"
- inputText: "45"
- runFlow:
    file: _dismiss_ime_done.yaml
- tapOn:
    id: "qa-vehicle-field-fuel-meter"
- inputText: "50000"
- runFlow:
    file: _dismiss_ime_done.yaml
- scrollUntilVisible:
    element:
      id: "qa-vehicle-save"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-vehicle-save"
    enabled: true
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-hub"
    timeout: 30000
- takeScreenshot: 02_fuel_purchase_saved
