appId: com.compartarenta.compartarenta.dev
---
# Cold start (one-shot post-action simulates notification); wait until home is ready.
- launchApp:
    stopApp: true
- runFlow:
    file: _accept_notification_prompt.yaml
- extendedWaitUntil:
    visible:
      id: "qa-home-housing"
    timeout: 90000
- takeScreenshot: payment_reminder_app_ready
