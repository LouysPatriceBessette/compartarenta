appId: com.compartarenta.compartarenta.dev
---
- runFlow:
    file: _enter_vehicle_hub.yaml
- takeScreenshot: 01_vehicle_hub
# --- Start use session at 50 000 km (prefilled) ---
- tapOn:
    id: "qa-vehicle-quick-action-session-start"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-field-session-full-tank"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-field-session-full-tank"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-field-session-tank-level"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-field-session-tank-level"
- tapOn: "1/2 - 50%"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-field-session-meter"
    timeout: 30000
- takeScreenshot: 02_session_start
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-vehicle-save"
    enabled: true
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-hub"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "qa-vehicle-quick-action-session-end"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-quick-action-session-end"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-civic-fuel-tank"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic-fuel-tank"
      text: ".*30[,.]0.*L.*"
    timeout: 30000
- takeScreenshot: 03_session_open
# --- Fuel purchase: full tank (default), odometer +100 km → 50 100 ---
- tapOn:
    id: "qa-vehicle-quick-action-fuel"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-field-cost"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-field-cost"
- inputText: "80"
- tapOn:
    id: "qa-vehicle-field-volume"
- inputText: "45"
- runFlow:
    file: _dismiss_ime_done.yaml
- tapOn:
    id: "qa-vehicle-field-fuel-meter"
- inputText: "50100"
- runFlow:
    file: _dismiss_ime_done.yaml
- scrollUntilVisible:
    element:
      id: "qa-vehicle-save"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-vehicle-save"
    enabled: true
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-hub"
    timeout: 30000
- takeScreenshot: 04_fuel_purchase_full_tank
# --- End session: 51 000 km → improbable 900 km since fuel at 50 100 ---
- scrollUntilVisible:
    element:
      id: "qa-vehicle-quick-action-session-end"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "qa-vehicle-quick-action-session-end"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-field-session-meter"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-field-session-meter"
- inputText: "51000"
- runFlow:
    file: _dismiss_ime_done.yaml
- scrollUntilVisible:
    element:
      id: "qa-vehicle-save"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-vehicle-save"
    enabled: true
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-gap-suspicious-cancel"
    timeout: 30000
- takeScreenshot: 05_suspicious_gap_dialog
- runFlow:
    file: _vehicle_gap_suspicious_cancel.yaml
# --- 50 700 km: 600 km since fuel (plausible) but 87 % tank suspicious ---
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-field-session-meter"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-field-session-meter"
- eraseText
- inputText: "50700"
- runFlow:
    file: _dismiss_ime_done.yaml
- scrollUntilVisible:
    element:
      id: "qa-vehicle-save"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-vehicle-save"
    enabled: true
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-session-end-tank-review"
    timeout: 30000
- takeScreenshot: 06_session_end_tank_confirm_dialog
- runFlow:
    file: _vehicle_session_end_tank_review.yaml
- tapOn:
    id: "qa-vehicle-field-session-tank-level"
- tapOn: "1/4 - 25%"
- scrollUntilVisible:
    element:
      id: "qa-vehicle-save"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-vehicle-save"
    enabled: true
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-hub"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-civic-meter"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic-meter"
      text: ".*50 700\\.0.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-civic-fuel-tank"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic-fuel-tank"
      text: ".*15[,.]0.*L.*"
    timeout: 30000
- takeScreenshot: 07_session_closed
