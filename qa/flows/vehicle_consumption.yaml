appId: com.compartarenta.compartarenta.dev
---
- runFlow:
    file: _enter_vehicle_hub.yaml
- takeScreenshot: 01_vehicle_hub
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-civic"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic-meter"
      text: ".*51 397\\.0.*"
    timeout: 30000
- takeScreenshot: 02_final_odometer
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-civic-consumption-reliability"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic-consumption-reliability"
      text: ".*est fiable.*"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-civic-consumption"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic-consumption"
      text: ".*Route:.*6[,.]7.*L/100.*"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic-consumption"
      text: ".*Ville:.*6[,.]9.*L/100.*"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic-consumption"
      text: ".*Traffic:.*8[,.]6.*L/100.*"
    timeout: 30000
- takeScreenshot: 03_consumption_breakdown
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-civic-fuel-tank"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic-fuel-tank"
      text: ".*60[,.]0.*L.*"
    timeout: 30000
- takeScreenshot: 04_fuel_tank_full
