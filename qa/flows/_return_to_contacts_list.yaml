appId: com.compartarenta.compartarenta.dev
---
# One back if not already on the main Contacts hub (invite FAB visible).
- runFlow:
    when:
      notVisible:
        id: "qa-contacts-invite-fab"
    commands:
      - back
      - waitForAnimationToEnd:
          timeout: 3000
- extendedWaitUntil:
    visible:
      id: "qa-contacts-invite-fab"
    timeout: 30000
