appId: com.compartarenta.compartarenta.dev
---
# Proposer: seeded draft at summary — submit only (FCM wake manual QA).
- launchApp:
    stopApp: true
- extendedWaitUntil:
    visible:
      id: "qa-home-housing"
    timeout: 45000
- tapOn:
    id: "qa-home-housing"
- extendedWaitUntil:
    visible:
      id: "qa-housing-wizard-summary-submit"
    timeout: 45000
- runFlow:
    file: _housing_proposal_submit_plan.yaml
- runFlow:
    file: _dismiss_notification_prompt.yaml
