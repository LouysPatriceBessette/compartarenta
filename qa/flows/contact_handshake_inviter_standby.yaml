appId: com.compartarenta.compartarenta.dev
---
# Stay on the generate screen (2s polling) — do not cold-restart the app.
- extendedWaitUntil:
    visible:
      id: "qa-contacts-invitation-short-code"
    timeout: 30000
# Handshake complete: generate pops to "Codes d'invitation" (not Contacts).
- extendedWaitUntil:
    notVisible:
      id: "qa-contacts-invitation-short-code"
    timeout: 180000
- runFlow:
    file: _return_to_contacts_list.yaml
- extendedWaitUntil:
    visible:
      id: "qa-contacts-row-louys-qa"
    timeout: 120000
