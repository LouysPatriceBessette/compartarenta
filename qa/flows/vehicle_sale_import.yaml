appId: com.compartarenta.compartarenta.dev
---
- runFlow:
    file: _enter_vehicle_hub.yaml
- takeScreenshot: 01_buyer_vehicle_hub_empty
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-add-fab"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-add-fab"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-import-action"
    timeout: 30000
- takeScreenshot: 02_buyer_add_vehicle
- tapOn:
    id: "qa-vehicle-import-action"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-import-confirm"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-import-confirm"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-hub"
    timeout: 60000
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-civic"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-card-qa-civic"
    timeout: 30000
- takeScreenshot: 03_buyer_imported_vehicle
# --- Rename imported vehicle (does not confirm import) ---
- tapOn:
    id: "qa-vehicle-card-qa-civic"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-detail"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-import-undo"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-detail-edit"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-field-label"
    timeout: 30000
- tapOn:
    id: "qa-vehicle-field-label"
- eraseText
- inputText: "QA Maserati"
- runFlow:
    file: _dismiss_ime_done.yaml
- scrollUntilVisible:
    element:
      id: "qa-vehicle-save"
    direction: DOWN
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-vehicle-save"
    enabled: true
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-detail"
    timeout: 30000
- back
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-hub"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-maserati"
    direction: DOWN
    timeout: 30000
- takeScreenshot: 04_buyer_renamed_vehicle
# --- Starting a use session confirms the import ---
- tapOn:
    id: "qa-vehicle-quick-action-session-start"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-save"
      enabled: true
    timeout: 30000
- tapOn:
    id: "qa-vehicle-save"
    enabled: true
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-import-commit-confirm"
    timeout: 30000
- takeScreenshot: 05_buyer_import_commit_dialog
- tapOn:
    id: "qa-vehicle-import-commit-confirm"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-hub"
    timeout: 60000
- scrollUntilVisible:
    element:
      id: "qa-vehicle-card-qa-maserati"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "qa-vehicle-card-qa-maserati"
- extendedWaitUntil:
    visible:
      id: "qa-vehicle-detail"
    timeout: 30000
- assertNotVisible:
    id: "qa-vehicle-import-undo"
- takeScreenshot: 06_buyer_import_confirmed
