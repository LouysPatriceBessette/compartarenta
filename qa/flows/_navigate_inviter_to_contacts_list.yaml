appId: com.compartarenta.compartarenta.dev
---
# Inviter-only: reach main contacts list from housing hub, invite flows, or home.
# Never back past qa-home-contacts (that exits the app to the launcher).
# From housing active hub, tap qa-housing-hub-back — system back races PopScope.
# Maestro re-evaluates `when` after each step: branches must be mutually exclusive.
- repeat:
    times: 6
    commands:
      - runFlow:
          when:
            notVisible:
              id: "qa-contacts-invite-fab"
          commands:
            - runFlow:
                when:
                  visible:
                    id: "qa-housing-active-hub"
                commands:
                  - tapOn:
                      id: "qa-housing-hub-back"
                  - waitForAnimationToEnd:
                      timeout: 2000
            - runFlow:
                when:
                  notVisible:
                    id: "qa-housing-active-hub"
                  visible:
                    id: "qa-home-contacts"
                commands:
                  - tapOn:
                      id: "qa-home-contacts"
                  - waitForAnimationToEnd:
                      timeout: 2000
            - runFlow:
                when:
                  notVisible:
                    id: "qa-housing-active-hub"
                commands:
                  - runFlow:
                      when:
                        notVisible:
                          id: "qa-home-contacts"
                      commands:
                        - runFlow:
                            when:
                              notVisible:
                                id: "qa-contacts-redeem-open"
                            commands:
                              - back
                              - waitForAnimationToEnd:
                                  timeout: 2000
- extendedWaitUntil:
    visible:
      id: "qa-contacts-invite-fab"
    timeout: 30000
