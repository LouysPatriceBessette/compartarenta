appId: com.compartarenta.compartarenta.dev
---
# Inviter-only: reach main contacts list (robust backs; works from invite / codes hub).
- repeat:
    times: 4
    commands:
      - runFlow:
          when:
            notVisible:
              id: "qa-contacts-invite-fab"
          commands:
            - back
- runFlow:
    when:
      visible:
        id: "qa-home-contacts"
    commands:
      - tapOn:
          id: "qa-home-contacts"
- extendedWaitUntil:
    visible:
      id: "qa-contacts-invite-fab"
    timeout: 30000
