appId: com.compartarenta.compartarenta.dev
---
# Tap second #10 (J−2) → journal still has first card + second card.
- extendedWaitUntil:
    visible: ".*#10 Rappel de paiement.*"
    timeout: 30000
- takeScreenshot: phase2_notification_shade
- tapOn: ".*#10 Rappel de paiement.*"
- takeScreenshot: phase2_after_notification_tap
- extendedWaitUntil:
    visible:
      id: "qa-housing-monthly-expenses-screen"
    timeout: 90000
- extendedWaitUntil:
    visible:
      id: "qa-housing-before-due-journal-card"
      index: 0
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "qa-housing-before-due-journal-card"
      index: 1
    timeout: 30000
- takeScreenshot: phase2_two_before_due_journal_cards
