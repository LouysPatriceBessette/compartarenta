appId: com.compartarenta.compartarenta.dev
---
# POC phase 1 — lendemain de periodEnd, fenêtre de règlement ouverte.
# Prérequis : ./tool/run_scenario.sh settlement_window_open (seed + date + ce flow)

- runFlow:
    file: _enter_housing_hub.yaml
- extendedWaitUntil:
    visible:
      id: "qa-housing-hub-settlement-due"
    timeout: 30000
- assertVisible: "Entrer un règlement de dû"
