name: mobile-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    if: false # Disabled for now... And most probably forever.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flutter (vendored) version
        run: ./tools/flutter/bin/flutter --version

      - name: Flutter pub get
        working-directory: mobile
        run: ../tools/flutter/bin/flutter pub get

      - name: Flutter analyze
        working-directory: mobile
        run: ../tools/flutter/bin/flutter analyze

      - name: Flutter test
        working-directory: mobile
        run: ../tools/flutter/bin/flutter test

  android-build:
    if: false # Disabled for now... And most probably forever.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [dev, staging, prod]
        mode: [debug]
        include:
          - flavor: prod
            mode: release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter (vendored) version
        run: ./tools/flutter/bin/flutter --version

      - name: Flutter pub get
        working-directory: mobile
        run: ../tools/flutter/bin/flutter pub get

      - name: Android build APK (debug)
        if: matrix.mode == 'debug'
        working-directory: mobile
        run: >
          ../tools/flutter/bin/flutter build apk
          --${{ matrix.mode }}
          --flavor ${{ matrix.flavor }}
          -t lib/main.dart
          --dart-define=ENV=${{ matrix.flavor }}
          --dart-define=API_BASE_URL=https://example.invalid

      - name: Android build AAB (release)
        if: matrix.mode == 'release'
        working-directory: mobile
        run: >
          ../tools/flutter/bin/flutter build appbundle
          --${{ matrix.mode }}
          --flavor ${{ matrix.flavor }}
          -t lib/main.dart
          --dart-define=ENV=${{ matrix.flavor }}
          --dart-define=API_BASE_URL=https://example.invalid

      - name: Write provenance
        working-directory: mobile
        run: |
          mkdir -p build/provenance
          cat > build/provenance/${{ matrix.flavor }}-${{ matrix.mode }}.json <<'EOF'
          {
            "platform": "android",
            "flavor": "${{ matrix.flavor }}",
            "mode": "${{ matrix.mode }}",
            "git_sha": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}"
          }
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.flavor }}-${{ matrix.mode }}
          path: |
            mobile/build/app/outputs/**
            mobile/build/provenance/**

  ios-build:
    if: false # Disabled for now... And most probably forever.
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        config: [debug, profile, release]
    steps:
      - uses: actions/checkout@v4

      - name: Flutter (vendored) version
        run: ./tools/flutter/bin/flutter --version

      - name: Flutter pub get
        working-directory: mobile
        run: ../tools/flutter/bin/flutter pub get

      - name: iOS build (no codesign)
        working-directory: mobile
        run: >
          ../tools/flutter/bin/flutter build ios
          --${{ matrix.config }}
          --no-codesign

      - name: Write provenance
        working-directory: mobile
        run: |
          mkdir -p build/provenance
          cat > build/provenance/ios-${{ matrix.config }}.json <<'EOF'
          {
            "platform": "ios",
            "configuration": "${{ matrix.config }}",
            "git_sha": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}"
          }
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ matrix.config }}
          path: |
            mobile/build/ios/**
            mobile/build/provenance/**

